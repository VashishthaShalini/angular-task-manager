<div class="task-input">
  <input [(ngModel)]="taskInput" placeholder="Enter task..." />
  <button (click)="addTask()">Add</button>
</div>

<div class="search-box">
  <input [(ngModel)]="searchText" placeholder="Search tasks..." />
</div>

<div class="filters">
  <button (click)="filter = 'all'" >All</button>
  <button (click)="filter = 'completed'">Completed</button>
  <button (click)="filter = 'pending'">Pending</button>
</div>

<ul>
  <li *ngFor="let task of getFilteredTasks()">

  <input type="checkbox" [(ngModel)]="task.completed" (change)="saveTasks()" />

  <!-- NORMAL VIEW -->
  <span *ngIf="!task.isEditing"
        [style.textDecoration]="task.completed ? 'line-through' : 'none'">
    {{ task.title }}
  </span>

  <!-- EDIT MODE -->
  <input *ngIf="task.isEditing"
         [(ngModel)]="task.title"
         (blur)="saveEdit(task)"
         (keyup.enter)="saveEdit(task)" />

  <!-- BUTTONS -->
  <button *ngIf="!task.isEditing" (click)="startEdit(task)">Edit</button>
  <button *ngIf="task.isEditing" (click)="saveEdit(task)">Save</button>

  <button (click)="deleteTask(task)">✖</button>

</li>
</ul>
